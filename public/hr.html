<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对点咨询 · HR管理后台</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root { --sidebar-width: 220px; --sidebar-bg: #1E3A5F; --sidebar-text: #CBD5E1; --sidebar-active: #2563EB; }
    [data-theme="dark"] { --sidebar-bg: #0F172A; --sidebar-text: #94A3B8; }

    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }

    /* Layout */
    .hr-layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      position: fixed; left: 0; top: 0; bottom: 0;
      display: flex; flex-direction: column;
      z-index: 100;
    }
    .sidebar .brand {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar .brand h1 { font-size: 16px; font-weight: 700; color: #fff; margin: 0; }
    .sidebar .brand p { font-size: 12px; color: rgba(255,255,255,0.5); margin: 4px 0 0; }
    .sidebar .nav {
      flex: 1; padding: 12px 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .sidebar .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; font-size: 14px;
      color: var(--sidebar-text); cursor: pointer; transition: all 0.2s;
      border-left: 3px solid transparent;
      background: none; border-top: none; border-right: none; border-bottom: none;
      width: 100%; text-align: left; font-family: inherit;
    }
    .sidebar .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .sidebar .nav-item.active { background: rgba(37,99,235,0.2); color: #fff; border-left-color: var(--sidebar-active); }
    .sidebar .nav-footer {
      padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 12px; color: rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar .nav-footer .user-email { color: rgba(255,255,255,0.7); font-weight: 500; }

    /* Main */
    .main { margin-left: var(--sidebar-width); flex: 1; min-width: 0; background: var(--bg); min-height: 100vh; }
    .main-header {
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; background: var(--bg-card); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .main-header .header-title { font-size: 18px; font-weight: 700; color: var(--text); }
    .main-header .header-actions { display: flex; align-items: center; gap: 10px; }

    .main-content { padding: 24px 28px; }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Dashboard */
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; text-align: center; transition: all 0.3s;
    }
    .stat-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
    .stat-card .stat-num { font-size: 28px; font-weight: 800; line-height: 1; color: var(--primary); }
    .stat-card .stat-lbl { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
    .reminder-bar {
      background: var(--warning-bg); border: 1px solid rgba(245,158,11,0.3); border-radius: var(--radius);
      padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
    }
    .reminder-bar .ri-text { font-size: 14px; flex: 1; }
    .reminder-bar .ri-name { font-weight: 600; }

    /* Talent Pool Header */
    .talent-header {
      background: linear-gradient(135deg, #2563EB, #1D4ED8);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 28px;
      color: #fff;
    }
    .talent-header h2 { font-size: 22px; font-weight: 700; margin: 0; }
    .talent-header p { font-size: 14px; opacity: 0.8; margin: 4px 0 0; }

    .talent-toolbar {
      background: var(--bg-card);
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 16px 20px;
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .talent-toolbar .search-box {
      flex: 1; min-width: 240px; display: flex; gap: 8px;
    }
    .talent-toolbar .search-box input {
      flex: 1; padding: 8px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg-input); color: var(--text); font-size: 14px; font-family: inherit; outline: none;
    }
    .talent-toolbar .search-box input:focus { border-color: var(--primary); }
    .talent-toolbar .filter-group {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .talent-toolbar .filter-group select, .talent-toolbar .filter-group input {
      padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg-input); color: var(--text); font-size: 13px; font-family: inherit; min-width: 100px;
    }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .data-table thead { background: var(--bg-input); }
    .data-table th { padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border); white-space: nowrap; }
    .data-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover { background: rgba(37,99,235,0.03); }
    .data-table tbody tr { cursor: pointer; }

    .cell-name { font-weight: 600; color: var(--text); }
    .cell-school { color: var(--text-secondary); }
    .cell-major { color: var(--text-secondary); font-size: 13px; }
    .cell-score { font-weight: 700; font-size: 16px; }
    .cell-score.high { color: #10B981; }
    .cell-score.mid { color: #3B82F6; }
    .cell-score.low { color: #F59E0B; }
    .cell-score.vlow { color: #EF4444; }

    .tag-pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; background: #EFF6FF; color: #3B82F6; margin: 1px 2px; }
    [data-theme="dark"] .tag-pill { background: rgba(59,130,246,0.15); }

    .action-btns { display: flex; gap: 6px; }
    .action-btns .btn { padding: 5px 12px; font-size: 12px; border-radius: 6px; }

    /* Detail Modal (desktop centered) */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .modal-sheet { background: var(--bg-card); border-radius: var(--radius-lg); width: 100%; max-width: 700px; max-height: 88vh; overflow-y: auto; padding: 24px 28px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-header h3 { font-size: 18px; font-weight: 700; }
    .modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg-input); color: var(--text); font-size: 18px; cursor: pointer; }

    .detail-section { margin-bottom: 20px; }
    .detail-section h4 { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .detail-row .label { color: var(--text-secondary); }
    .detail-row .value { font-weight: 500; color: var(--text); }
    .flow-btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .ai-report { background: linear-gradient(135deg, rgba(37,99,235,0.05), rgba(99,102,241,0.05)); border: 1px solid rgba(37,99,235,0.15); border-radius: var(--radius); padding: 14px; margin-top: 12px; }
    .ai-report .ai-score-big { text-align: center; margin-bottom: 10px; }
    .ai-report .ai-score-big .big-num { font-size: 48px; font-weight: 800; line-height: 1; }
    .ai-report .ai-text { font-size: 13px; line-height: 1.8; color: var(--text-secondary); white-space: pre-wrap; }
    .log-item { padding: 8px 12px; background: var(--bg-input); border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 13px; border-left: 2px solid var(--border); }
    .log-item .log-meta { font-size: 11px; color: var(--text-muted); }
    .log-item .log-action { font-weight: 600; color: var(--text); }
    .password-section { background: var(--bg-input); border-radius: var(--radius); padding: 16px; margin-top: 12px; }
    .editable-area { min-height: 150px; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; outline: none; font-size: 14px; line-height: 1.8; color: var(--text); background: var(--bg-card); }
    .editable-area:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
    .editable-area:empty::before { content: attr(data-placeholder); color: var(--text-muted); }
    .editable-area img { max-width: 100%; border-radius: 8px; margin: 8px 0; }

    .info-editor-section { margin-bottom: 20px; }
    .info-editor-section h4 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }

    /* Login page (centered) */
    .login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: var(--bg); }
    .login-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow);
    }
    .login-card h2 { font-size: 22px; font-weight: 700; margin: 0 0 4px; text-align: center; }
    .login-card .login-sub { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--bg-input); color: var(--text); font-size: 15px; font-family: inherit; outline: none; transition: all 0.2s; }
    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
    .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .mt-4 { margin-top: 16px; }
    .btn-block { width: 100%; }

    /* Responsive */
    @media (max-width: 1024px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .talent-toolbar { flex-direction: column; align-items: stretch; }
      .talent-toolbar .filter-group { width: 100%; }
      .data-table { display: block; overflow-x: auto; }
    }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .modal-sheet { max-width: 95vw; padding: 16px; }
      .login-card { padding: 24px; }
    }

    /* Analytics Page Styles */
    .analytics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 24px; }
    .analytics-grid.three-col { grid-template-columns: repeat(3, 1fr); }
    .chart-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; transition: all 0.3s;
    }
    .chart-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
    .chart-card h3 { font-size: 16px; font-weight: 600; margin: 0 0 16px; color: var(--text); }
    .chart-container { position: relative; height: 300px; }
    .chart-container.small { height: 250px; }
    .analytics-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .analytics-summary .summary-item {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; text-align: center;
    }
    .analytics-summary .summary-item .num { font-size: 24px; font-weight: 700; color: var(--primary); }
    .analytics-summary .summary-item .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* Scoring Rules Page Styles */
    .scoring-rule-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin-bottom: 16px; transition: all 0.3s;
    }
    .scoring-rule-card.active { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
    .scoring-rule-card .rule-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .scoring-rule-card .rule-header h3 { font-size: 16px; font-weight: 600; margin: 0; }
    .scoring-rule-card .rule-header .badge {
      padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500;
    }
    .scoring-rule-card .rule-header .badge.active {
      background: #D1FAE5; color: #065F46;
    }
    .scoring-rule-card .rule-header .badge.inactive {
      background: var(--bg-input); color: var(--text-muted);
    }
    .dimension-list { display: flex; flex-direction: column; gap: 12px; }
    .dimension-item {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      background: var(--bg-input); border-radius: var(--radius-sm);
    }
    .dimension-item .dim-name { flex: 1; font-size: 14px; font-weight: 500; }
    .dimension-item .dim-weight { width: 80px; }
    .dimension-item .dim-score { width: 80px; text-align: center; font-size: 13px; color: var(--text-muted); }
    .threshold-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 16px; }
    .threshold-item {
      padding: 12px; background: var(--bg-input); border-radius: var(--radius-sm);
      text-align: center;
    }
    .threshold-item .th-label { font-size: 12px; color: var(--text-muted); }
    .threshold-item .th-value { font-size: 18px; font-weight: 700; color: var(--primary); }

    /* 流程比例卡片 */
    .ratio-grid { display: flex; flex-direction: column; gap: 12px; }
    .ratio-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--bg-hover);
      border-radius: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .ratio-item:hover { transform: translateX(4px); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .ratio-icon {
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .ratio-body { flex: 1; min-width: 0; }
    .ratio-label { font-size: 14px; font-weight: 600; color: var(--text); }
    .ratio-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .ratio-value { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }

    /* 大使数据看板 */
    .amb-rank { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-size: 13px; font-weight: 800; }
    .amb-rank.r1 { background: linear-gradient(135deg,#F59E0B,#FBBF24); color: #fff; }
    .amb-rank.r2 { background: linear-gradient(135deg,#94A3B8,#CBD5E1); color: #fff; }
    .amb-rank.r3 { background: linear-gradient(135deg,#CD7F32,#E5A05C); color: #fff; }
    .amb-rank.r- { background: var(--bg-input); color: var(--text-muted); font-size: 12px; }
    .amb-expand-row { background: var(--bg-input) !important; }
    .amb-referrals { padding: 16px 20px; }
    .amb-referrals-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; }
    .amb-no-resume { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: rgba(245,158,11,0.1); color: #F59E0B; }
    .amb-has-resume { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: rgba(16,185,129,0.1); color: #10B981; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="/js/common.js"></script>
  <script>
    const app = document.getElementById('app');
    let currentUser = null;
    let currentTab = 'dashboard';

    async function init() {
      const token = Storage.get('token');
      if (!token) { renderLogin(); return; }
      try {
        const data = await apiClient.get('/api/auth/me');
        if (data.role !== 'hr') { Storage.remove('token'); Storage.remove('user'); renderLogin(); return; }
        currentUser = data;
        Storage.set('user', data);
        renderMain();
      } catch (e) { Storage.remove('token'); Storage.remove('user'); renderLogin(); }
    }

    // ==================== Login ====================
    function renderLogin() {
      app.innerHTML = `
        <div class="login-page">
          <button class="theme-btn" onclick="toggleTheme()" style="position:fixed;top:16px;right:16px;width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:10;">🌙</button>
          <div class="login-card">
            <h2>🔐 HR管理后台</h2>
            <p class="login-sub">使用 @hr-mp.com 邮箱登录</p>
            <div class="form-group">
              <label class="form-label">HR邮箱</label>
              <input type="email" id="login-email" class="form-input" placeholder="xxx@hr-mp.com" autocomplete="email">
              <div class="form-hint">仅支持 @hr-mp.com 后缀的邮箱</div>
            </div>
            <div class="form-group">
              <label class="form-label">密码</label>
              <input type="password" id="login-password" class="form-input" placeholder="请输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()">
              <div class="form-hint">首次登录默认密码为 123456</div>
            </div>
            <button class="btn btn-primary btn-lg btn-block mt-4" onclick="handleLogin()">登录</button>
          </div>
        </div>
      `;
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { showToast('请输入邮箱和密码', 'error'); return; }
      try {
        const data = await apiClient.post('/api/auth/hr-login', { email, password });
        Storage.set('token', data.token);
        Storage.set('user', data.user);
        currentUser = data.user;
        showToast('登录成功', 'success');
        renderMain();
      } catch (e) { showToast(e.message, 'error'); }
    }

    // ==================== Main Layout ====================
    function renderMain() {
      app.innerHTML = `
        <div class="hr-layout">
          <aside class="sidebar">
            <div class="brand">
              <h1>💼 对点咨询</h1>
              <p>HR管理后台</p>
            </div>
            <div class="nav">
              <button class="nav-item ${currentTab==='dashboard'?'active':''}" onclick="switchNavTab('dashboard')">📊 个人数据看板</button>
              <button class="nav-item ${currentTab==='analytics'?'active':''}" onclick="switchNavTab('analytics')">📈 数据分析</button>
              <button class="nav-item ${currentTab==='talent'?'active':''}" onclick="switchNavTab('talent')">👥 人才库</button>
              <button class="nav-item ${currentTab==='ambassadors'?'active':''}" onclick="switchNavTab('ambassadors')">🎓 校园大使</button>
              <button class="nav-item ${currentTab==='scoring'?'active':''}" onclick="switchNavTab('scoring')">🤖 AI评分规则</button>
              <button class="nav-item ${currentTab==='info'?'active':''}" onclick="switchNavTab('info')">📝 信息管理</button>
            </div>
            <div class="nav-footer">
              <span class="user-email">${currentUser.email || 'HR'}</span>
              <button class="btn btn-sm" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);border:none;" onclick="logout()">退出</button>
            </div>
          </aside>
          <div class="main">
            <div class="main-header">
              <span class="header-title">${tabTitle(currentTab)}</span>
              <div class="header-actions">
                <button class="theme-btn" onclick="toggleTheme()" style="width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">🌙</button>
                <button class="btn btn-outline btn-sm" onclick="showPasswordModal()">修改密码</button>
              </div>
            </div>
            <div class="main-content">
              <div id="panel-dashboard" class="tab-panel ${currentTab==='dashboard'?'active':''}"></div>
              <div id="panel-analytics" class="tab-panel ${currentTab==='analytics'?'active':''}"></div>
              <div id="panel-talent" class="tab-panel ${currentTab==='talent'?'active':''}"></div>
              <div id="panel-ambassadors" class="tab-panel ${currentTab==='ambassadors'?'active':''}"></div>
              <div id="panel-scoring" class="tab-panel ${currentTab==='scoring'?'active':''}"></div>
              <div id="panel-info" class="tab-panel ${currentTab==='info'?'active':''}"></div>
            </div>
          </div>
        </div>
      `;
      updateThemeIcon();
      loadCurrentPanel();
    }

    function tabTitle(tab) {
      return { dashboard:'个人数据看板', analytics:'数据分析', talent:'人才库', scoring:'AI评分规则', ambassadors:'校园大使', info:'信息管理' }[tab] || '';
    }

    function updateThemeIcon() {
      const theme = document.documentElement.getAttribute('data-theme') || 'light';
      document.querySelectorAll('.theme-btn').forEach(btn => btn.textContent = theme === 'dark' ? '☀️' : '🌙');
    }

    function switchNavTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
      document.querySelector('.header-title').textContent = tabTitle(tab);
      loadCurrentPanel();
    }

    function loadCurrentPanel() {
      switch (currentTab) {
        case 'dashboard': loadDashboard(); break;
        case 'analytics': loadAnalytics(); break;
        case 'talent': loadTalentPool(); break;
        case 'scoring': loadScoringRules(); break;
        case 'ambassadors': loadAmbassadorDashboard(); break;
        case 'info': loadInfoEditor(); break;
      }
    }

    function logout() {

    async function handleChangePassword() {
      const oldPwd = document.getElementById('old-pwd').value;
      const newPwd = document.getElementById('new-pwd').value;
      const confirmPwd = document.getElementById('confirm-pwd').value;
      if (!oldPwd || !newPwd || !confirmPwd) { showToast('请填写所有密码字段', 'error'); return; }
      if (newPwd !== confirmPwd) { showToast('两次输入的新密码不一致', 'error'); return; }
      if (newPwd.length < 6) { showToast('新密码至少6位', 'error'); return; }
      try {
        await apiClient.put('/api/auth/hr-password', { oldPassword: oldPwd, newPassword: newPwd });
        showToast('密码修改成功', 'success');
        document.querySelector('.modal-overlay')?.remove();
      } catch (e) { showToast(e.message, 'error'); }
    }

    // ==================== Dashboard ====================
    function calcRatio(num, denom) {
      if (!denom || denom === 0) return '0%';
      return Math.round(num / denom * 1000) / 10 + '%';
    }

              <div class="ratio-item">

    async function handleReminder(appId) {

    // ==================== Talent Pool ====================
    async function loadTalentPool(filters = {}) {
      const panel = document.getElementById('panel-talent');
      panel.innerHTML = '<div class="loading-page"><div class="spinner"></div></div>';
      try {
        const params = new URLSearchParams();
        if (filters.search) params.set('search', filters.search);
        if (filters.school) params.set('school', filters.school);
        if (filters.major) params.set('major', filters.major);
        if (filters.location) params.set('location', filters.location);
        if (filters.status) params.set('status', filters.status);
        const apps = await apiClient.get('/api/hr/applications?' + params.toString());

        panel.innerHTML = `
          <div class="talent-header">
            <h2>人才库</h2>
            <p>管理和筛选候选人</p>
          </div>
          <div class="talent-toolbar">
            <div class="search-box">
              <input type="text" id="talent-search" placeholder="搜索姓名、学校、专业..." value="${filters.search || ''}" onkeydown="if(event.key==='Enter')applyTalentFilter()">
              <button class="btn btn-primary" onclick="applyTalentFilter()">搜索</button>
            </div>
            <div class="filter-group">
              <input type="text" id="filter-school" placeholder="高校" value="${filters.school || ''}" style="min-width:100px;" onkeydown="if(event.key==='Enter')applyTalentFilter()">
              <input type="text" id="filter-major" placeholder="专业" value="${filters.major || ''}" style="min-width:100px;" onkeydown="if(event.key==='Enter')applyTalentFilter()">
              <input type="text" id="filter-location" placeholder="地点" value="${filters.location || ''}" style="min-width:100px;" onkeydown="if(event.key==='Enter')applyTalentFilter()">
              <select id="filter-status" onchange="applyTalentFilter()" style="min-width:100px;">
                <option value="">全部状态</option>
                <option value="pending" ${filters.status==='pending'?'selected':''}>待筛选</option>
                <option value="passed" ${filters.status==='passed'?'selected':''}>已通过</option>
                <option value="first_interview" ${filters.status==='first_interview'?'selected':''}>初面中</option>
                <option value="second_interview" ${filters.status==='second_interview'?'selected':''}>复面中</option>
                <option value="offer" ${filters.status==='offer'?'selected':''}>已Offer</option>
                <option value="onboarded" ${filters.status==='onboarded'?'selected':''}>已入职</option>
                <option value="rejected" ${filters.status==='rejected'?'selected':''}>已拒绝</option>
              </select>
            </div>
          </div>

          <div style="overflow-x:auto;">
            <table class="data-table">
              <thead>
                <tr>
                  <th>姓名</th>
                  <th>学校</th>
                  <th>专业</th>
                  <th>AI评分</th>
                  <th>标签</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                ${apps.length === 0 ? `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">暂无候选人数据</td></tr>` :
                  apps.map(a => {
                    const scoreClass = a.ai_score >= 80 ? 'high' : a.ai_score >= 60 ? 'mid' : 'low';
                    const tags = parseTags(a.tags);
                    return `<tr onclick="openTalentDetail('${a.id}')">
                      <td><span class="cell-name">${a.candidate_name || '未填写'}</span></td>
                      <td><span class="cell-school">${a.school || '-'}</span></td>
                      <td><span class="cell-major">${a.major || '-'}</span></td>
                      <td><span class="cell-score ${scoreClass}">${a.ai_score || '-'}${a.ai_score ? '分' : ''}</span></td>
                      <td>${tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</td>
                      <td><span class="status-badge ${statusBadgeClass(a.status)}">${statusLabel(a.status)}</span></td>
                      <td>
                        <div class="action-btns">
                          <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openTalentDetail('${a.id}')">查看</button>
                          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openTalentDetail('${a.id}')">更新状态</button>
                        </div>
                      </td>
                    </tr>`;
                  }).join('')
                }
              </tbody>
            </table>
          </div>
        `;
      } catch (e) { panel.innerHTML = '<div class="empty-state"><div class="empty-text">加载失败</div></div>'; }
    }

    function parseTags(tags) {
      if (!tags) return [];
      try { return JSON.parse(tags); } catch { return tags.split(',').map(t => t.trim()).filter(Boolean); }
    }

    function applyTalentFilter() {
      loadTalentPool({
        search: document.getElementById('talent-search').value.trim(),
        school: document.getElementById('filter-school').value.trim(),
        major: document.getElementById('filter-major').value.trim(),
        location: document.getElementById('filter-location').value.trim(),
        status: document.getElementById('filter-status').value
      });
    }

    function statusLabel(s) {
      const m = {pending:'待筛选',passed:'筛选通过',rejected:'未通过',first_interview:'初面中',interview_rejected:'初面未通过',interview_waived:'放弃面试',second_interview:'复面中',second_rejected:'复面未通过',second_waived:'放弃面试',offer:'已发Offer',offer_rejected:'放弃Offer',onboarded:'已入职',resigned:'已离职'};
      return m[s] || s;
    }

    function statusBadgeClass(s) {
      if (['pending'].includes(s)) return 'pending';
      if (['passed','first_interview','second_interview'].includes(s)) return 'process';
      if (['offer'].includes(s)) return 'success';
      if (['onboarded'].includes(s)) return 'success';
      if (['rejected','interview_rejected','second_rejected','interview_waived','second_waived','offer_rejected','resigned'].includes(s)) return 'danger';
      return 'pending';
    }

    // ==================== Talent Detail Modal ====================
    let currentDetailApp = null;

    async function openTalentDetail(appId) {
      try {
        const data = await apiClient.get('/api/hr/applications/' + appId);
        currentDetailApp = data.application;
        const a = data.application;
        const logs = data.operationLogs || [];
        const nextActions = getNextActions(a.status);

        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
          <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-header">
              <h3>候选人详情</h3>
              <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
            </div>

            <div class="detail-section">
              <h4>基本信息</h4>
              <div class="detail-row"><span class="label">姓名</span><span class="value">${a.candidate_name || '未填写'}</span></div>
              <div class="detail-row"><span class="label">手机号</span><span class="value">${a.candidate_phone}</span></div>
              <div class="detail-row"><span class="label">学校</span><span class="value">${a.school || '未填写'}</span></div>
              <div class="detail-row"><span class="label">专业</span><span class="value">${a.major || '未填写'}</span></div>
              <div class="detail-row"><span class="label">内推码</span><span class="value" style="color:var(--primary);font-weight:600;">${a.referral_code || '无'}</span></div>
              <div class="detail-row"><span class="label">当前状态</span><span class="value"><span class="status-badge ${statusBadgeClass(a.status)}">${statusLabel(a.status)}</span></span></div>
              ${a.first_interview_time ? `<div class="detail-row"><span class="label">初面时间</span><span class="value">${a.first_interview_time}</span></div>` : ''}
              ${a.second_interview_time ? `<div class="detail-row"><span class="label">复面时间</span><span class="value">${a.second_interview_time}</span></div>` : ''}
              ${a.onboard_time ? `<div class="detail-row"><span class="label">入职时间</span><span class="value">${a.onboard_time}</span></div>` : ''}
            </div>

            ${a.resume_name ? `
              <div class="detail-section">
                <h4>简历</h4>
                <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-input);border-radius:var(--radius);">
                  <span>📄</span>
                  <span style="flex:1;font-size:13px;">${a.resume_name}</span>
                  <button class="btn btn-outline btn-sm" onclick="downloadResume('${a.resume_path.split('/').pop()}')">下载</button>
                </div>
                ${a.ai_score ? `
                  <div class="ai-report">
                    <div class="ai-score-big">
                      <div class="big-num" style="color:${a.ai_score >= 80 ? '#10B981' : a.ai_score >= 60 ? '#F59E0B' : '#EF4444'}">${a.ai_score}</div>
                      <div class="big-label">AI综合评分</div>
                    </div>
                    <div class="ai-text">${a.ai_analysis || '暂无分析报告'}</div>
                  </div>
                ` : ''}
              </div>
            ` : ''}

            ${nextActions.length > 0 ? `
              <div class="detail-section">
                <h4>操作</h4>
                <div class="flow-btn-group">
                  ${nextActions.map(act => {
                    const btnClass = act.style === 'danger' ? 'btn-danger' : act.style === 'success' ? 'btn-success' : 'btn-primary';
                    return `<button class="btn btn-sm ${btnClass}" onclick="handleFlowAction('${a.id}', '${act.status}', '${act.label}')">${act.label}</button>`;
                  }).join('')}
                </div>
              </div>
            ` : '<div class="detail-section"><div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px;">该候选人流程已结束</div></div>'}

            ${logs.length > 0 ? `
              <div class="detail-section">
                <h4>操作记录</h4>
                ${logs.map(log => {
                  const detail = JSON.parse(log.details || '{}');
                  return `<div class="log-item">
                    <div class="log-meta">${formatDate(log.created_at)} · HR: ${log.hr_email || log.hr_name || '未知'}</div>
                    <div class="log-action">${statusLabel(log.action)}</div>
                    ${detail.first_interview_time ? `<div class="log-detail">初面时间: ${detail.first_interview_time}</div>` : ''}
                    ${detail.second_interview_time ? `<div class="log-detail">复面时间: ${detail.second_interview_time}</div>` : ''}
                    ${detail.onboard_time ? `<div class="log-detail">入职时间: ${detail.onboard_time}</div>` : ''}

        modal.addEventListener('click', () => modal.remove());
        document.body.appendChild(modal);
      } catch (e) { showToast(e.message, 'error'); }
    }

    function getNextActions(status) {
      const flow = {
        'pending': [{ status:'passed', label:'通过', style:'primary' }, { status:'rejected', label:'不通过', style:'danger' }],
        'passed': [{ status:'first_interview', label:'安排初面', style:'primary' }, { status:'rejected', label:'拒绝', style:'danger' }],
        'first_interview': [
          { status:'second_interview', label:'进入复面', style:'primary' },
          { status:'interview_rejected', label:'面试不通过', style:'danger' },
          { status:'interview_waived', label:'放弃面试', style:'danger' },
          { status:'offer', label:'发Offer', style:'success' }
        ],
        'second_interview': [
          { status:'second_rejected', label:'复面不通过', style:'danger' },
          { status:'second_waived', label:'放弃面试', style:'danger' },
          { status:'offer', label:'发Offer', style:'success' }
        ],
        'offer': [
          { status:'onboarded', label:'已入职', style:'success' },
          { status:'offer_rejected', label:'放弃Offer', style:'danger' }
        ],
        'onboarded': [
          { status:'resigned', label:'已离职', style:'danger' }
        ]
      };
      return flow[status] || [];
    }

    async function handleFlowAction(appId, status, label) {
      const extraFields = {};
      if (status === 'first_interview') { const time = prompt('请输入初面时间（如 2025-03-15 14:00），留空跳过：'); if (time) extraFields.first_interview_time = time; }
      if (status === 'second_interview') { const time = prompt('请输入复面时间（如 2025-03-20 14:00），留空跳过：'); if (time) extraFields.second_interview_time = time; }
      if (status === 'onboarded') { const time = prompt('请输入入职时间（如 2025-04-01）：'); if (!time) { showToast('入职时间不能为空', 'error'); return; } extraFields.onboard_time = time; }
      if (status === 'resigned') { const time = prompt('请输入离职时间（如 2025-06-01）：'); if (!time) { showToast('离职时间不能为空', 'error'); return; } extraFields.resign_time = time; }
      try {
        await apiClient.put('/api/hr/applications/' + appId + '/status', { status, ...extraFields });
        showToast('操作成功: ' + label, 'success');
        document.querySelector('.modal-overlay')?.remove();
        loadCurrentPanel();
      } catch (e) { showToast(e.message, 'error'); }
    }

    function renderChart(canvasId, type, data, labelKey, valueKey) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      const labels = data.map(item => item[labelKey] || item.status || item.label);
      const values = data.map(item => item.count);

      const colors = [
        '#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6',
        '#EC4899', '#14B8A6', '#F97316', '#6366F1', '#06B6D4'
      ];

      analyticsCharts[canvasId] = new Chart(ctx, {
        type: type,
        data: {
          labels: labels,
          datasets: [{
            label: valueKey,
            data: values,
            backgroundColor: type === 'pie' || type === 'doughnut' ? colors : colors[0],
            borderColor: type === 'pie' || type === 'doughnut' ? colors : colors[0],
            borderWidth: 1,
            borderRadius: type === 'bar' ? 6 : 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: type === 'pie' || type === 'doughnut',
              position: 'right'
            }
          },
          scales: type === 'bar' ? {
            y: { beginAtZero: true, ticks: { stepSize: 1 } }
          } : {}
        }
      });
    }

    function renderTimelineChart(canvasId, data) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      const labels = data.map(item => item.date);

      analyticsCharts[canvasId] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: '投递人数',
              data: data.map(item => item.applications),
              borderColor: '#3B82F6',
              backgroundColor: 'rgba(59, 130, 246, 0.1)',
              tension: 0.4
            },
            {
              label: '已筛选',
              data: data.map(item => item.screened),
              borderColor: '#10B981',
              backgroundColor: 'rgba(16, 185, 129, 0.1)',
              tension: 0.4
            },
            {
              label: '已发Offer',
              data: data.map(item => item.offered),
              borderColor: '#F59E0B',
              backgroundColor: 'rgba(245, 158, 11, 0.1)',
              tension: 0.4
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true, position: 'top' }
          },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1 } }
          }
        }
      });
    }

    async function saveRule(ruleId) {
      const ruleName = document.getElementById('rule-name').value.trim();
      if (!ruleName) { showToast('请输入规则名称', 'error'); return; }

      const dimensionItems = document.querySelectorAll('#dimensions-editor .dimension-item');
      const dimensions = [];
      const weights = {};

      dimensionItems.forEach(item => {
        const name = item.querySelector('.dim-name-input').value.trim();
        const weight = parseInt(item.querySelector('.dim-weight-input').value) || 0;
        if (name) {
          dimensions.push(name);
          weights[name] = weight;
        }
      });

      if (dimensions.length === 0) { showToast('请至少添加一个评分维度', 'error'); return; }

      const thresholds = {
        '优秀': parseInt(document.getElementById('threshold-excellent').value) || 90,
        '良好': parseInt(document.getElementById('threshold-good').value) || 75,
        '一般': parseInt(document.getElementById('threshold-average').value) || 60,
        '需改进': 0
      };

      try {
        if (ruleId) {
          await apiClient.put('/api/hr/scoring-rules/' + ruleId, {
            rule_name: ruleName,
            dimensions, weights, thresholds
          });
          showToast('规则更新成功', 'success');
        } else {
          await apiClient.post('/api/hr/scoring-rules', {
            rule_name: ruleName,
            dimensions, weights, thresholds
          });
          showToast('规则创建成功', 'success');
        }
        document.querySelector('.modal-overlay')?.remove();
        loadScoringRules();
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    function execRichCmd(editorId, cmd, value) { document.getElementById(editorId).focus(); document.execCommand(cmd, false, value || null); }
    function insertImage(editorId) {
      // 创建隐藏文件输入框
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/jpeg,image/png,image/gif,image/webp';
      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) { showToast('图片大小不能超过10MB', 'error'); return; }
        
        const formData = new FormData();
        formData.append('image', file);
        try {
          showToast('正在上传图片...', 'info');
          const data = await api('/api/upload/image', { method: 'POST', body: formData });
          document.getElementById(editorId).focus();
          document.execCommand('insertImage', false, data.url);
          showToast('图片已插入', 'success');
        } catch (e) {
          showToast('图片上传失败: ' + e.message, 'error');
        }
      };
      input.click();
    }

                  <td class="cell-major">${escapeHtml(a.major || '-')}</td>
                  <td style="text-align:center;font-weight:700;">${a.codeCount}</td>
                  <td style="text-align:center;font-weight:700;color:#2563EB;">${a.referralCount}</td>
                  <td style="text-align:center;font-weight:700;color:#10B981;">${a.interviewCount}</td>
                  <td style="text-align:center;font-weight:700;color:#F59E0B;">${a.offerCount}</td>
                  <td style="text-align:center;">
                    ${a.hasResume ? '<span class="amb-has-resume">已上传</span>' : '<span class="amb-no-resume">未上传</span>'}
                  </td>
                </tr>
                <tr id="amb-expand-${a.id}" style="display:none;" class="amb-expand-row">
                  <td colspan="10" style="padding:0;border-bottom:1px solid var(--border);">
                    <div class="amb-referrals" id="amb-referrals-${a.id}">
                      <div class="amb-referrals-title">📋 ${escapeHtml(a.name || a.phone)} 的推荐简历</div>
                      <div class="loading-page" style="padding:20px;"><div class="spinner"></div></div>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function applyAmbFilter() {
      ambSearch = document.getElementById('amb-search')?.value.trim() || '';
      ambFilterSchool = document.getElementById('amb-filter-school')?.value.trim() || '';
      ambFilterMajor = document.getElementById('amb-filter-major')?.value.trim() || '';
      ambFilterLocation = document.getElementById('amb-filter-location')?.value.trim() || '';
      ambResumeFilter = document.getElementById('amb-filter-resume')?.value || '';
      renderAmbassadorTable();
    }

    async function toggleAmbReferrals(ambId) {
      const expandRow = document.getElementById('amb-expand-' + ambId);
      if (!expandRow) return;
      if (expandRow.style.display === 'none') {
        // 关闭其他展开的
        document.querySelectorAll('.amb-expand-row').forEach(r => r.style.display = 'none');
        expandRow.style.display = '';
        // 加载推荐简历
        const container = document.getElementById('amb-referrals-' + ambId);
        try {
          const apps = await apiClient.get('/api/hr/ambassadors/' + ambId + '/applications');
          if (apps.length === 0) {
            container.innerHTML = `<div class="amb-referrals-title">📋 推荐简历</div><div style="color:var(--text-muted);padding:12px 0;">该大使暂无推荐简历</div>`;
          } else {
            container.innerHTML = `
              <div class="amb-referrals-title">📋 推荐简历（共 ${apps.length} 份）</div>
              <div style="overflow-x:auto;">
                <table class="data-table" style="font-size:13px;">
                  <thead>
                    <tr>
                      <th>候选人</th>
                      <th>高校</th>
                      <th>专业</th>
                      <th>AI评分</th>
                      <th>状态</th>
                      <th>内推码</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${apps.map(app => `
                      <tr>
                        <td><div class="cell-name">${escapeHtml(app.candidate_name || '未知')}</div><div class="cell-school" style="font-size:11px;">${escapeHtml(app.candidate_phone || '')}</div></td>
                        <td class="cell-school">${escapeHtml(app.school || '-')}</td>
                        <td class="cell-major">${escapeHtml(app.major || '-')}</td>
                        <td><span class="cell-score ${app.ai_score >= 80 ? 'high' : app.ai_score >= 60 ? 'mid' : app.ai_score >= 40 ? 'low' : 'vlow'}">${app.ai_score || '-'}</span></td>
                        <td><span class="status-badge status-${app.status}">${statusLabel(app.status)}</span></td>
                        <td style="font-family:monospace;font-size:12px;letter-spacing:1px;">${app.referral_code || '-'}</td>
                        <td>
                          <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();viewAmbResume('${app.resume_path}','${escapeHtml(app.resume_name || '')}')">查看简历</button>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            `;
          }
        } catch (e) {
          container.innerHTML = `<div class="amb-referrals-title">📋 推荐简历</div><div style="color:var(--error);padding:12px 0;">加载失败</div>`;
        }
      } else {
        expandRow.style.display = 'none';
      }
    }

    function viewAmbResume(path, name) {
      if (path) window.open(path, '_blank');
      else showToast('简历文件不存在', 'error');
    }

    init();
  </script>
</body>
</html>
